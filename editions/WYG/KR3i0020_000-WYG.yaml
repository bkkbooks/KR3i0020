body:
  text: 茶録宋蔡襄撰臣前因奏事伏蒙陛下諭臣先任福建轉運使日所進上品龍茶最為精好臣退念草木之微首辱陛下知鑒若處之得地則能盡其材昔陸羽茶經不第建安之品丁謂茶圖獨論採造之本至於烹試曽未有聞臣輒條數事簡而易明勒成二篇名曰茶録伏惟清閒之宴或賜觀采臣不勝惶懼榮幸之至謹序上篇論茶色茶色貴白而餅茶多以珍膏油去聲其面故有青黄紫黑之異善别茶者正如相工之眎人氣色也隱然察之於内以肉理潤者為上顏色次之黄白者受水昏重青白者受水詳明故建安人開試以青白勝黄白香茶有真香而入貢者微以龍腦和膏欲助其香建安民間試茶皆不入香恐奪其真若烹㸃之際又雜珍果香草其奪益甚正當不用味茶味主於甘滑惟北苑鳯皇山連屬諸焙所産者味佳隔溪諸山雖及時加意製作色味皆重莫能及也又有水泉不甘能損茶味前世之論水品者以此藏茶茶宜蒻葉而畏香藥喜温燥而忌濕冷故收藏之家以蒻葉封裹入焙中兩三日一次用火常如人體温温則禦濕潤若火多則茶焦不可食炙茶茶或經年則香色味皆陳於淨器中以沸湯漬之刮去膏油一兩重乃止以鈐箝之微火炙乾然後碎碾若當年新茶則不用此説碾茶碾茶先以淨紙密裹搥碎然後熟碾其大要旋碾則色白或經宿則色已昏矣羅茶羅細則茶浮麤則水浮候湯候湯最難未熟則沫浮過熟則茶沈前世謂之蟹眼者過熟湯也沈瓶中煮之不可辯故曰候湯最難熁盞凡欲㸃茶先須熁盞令熱冷則茶不浮㸃茶茶少湯多則雲脚散湯少茶多則粥面聚建人謂之雲脚粥面鈔茶一錢匕先注湯調令極勻又添注入環迴擊拂湯上盞可四分則止眡其面色鮮白著盞無水痕為絶佳建安開試以水痕先者為負耐乆者為勝故較勝負之説曰相去一水兩水下篇論茶器茶焙茶焙編竹為之裹以蒻葉蓋其上以收火也隔其中以有容也納火其下去茶尺許常温温然所以養茶色香味也茶籠茶不入焙者宜密封裹以蒻籠盛之置髙處不近濕氣砧椎砧椎蓋以砧茶砧以木為之椎或金或鐵取於便用茶鈐茶鈐屈金鐵為之用以炙茶茶碾茶碾以銀或鐵為之黄金性柔銅及䃋石皆能生鉎音星不入用茶羅茶羅以絶細為佳羅底用蜀東川鵝溪畫絹之宻者投湯中揉洗以羃之茶盞茶色白宜黑盞建安所造者紺黑紋如兔毫其杯微厚熁之乆熱難冷􅇰為要用出他處者或薄或色紫皆不及也其青白盞鬬試家自不用茶匙茶匙要重擊拂有力黄金為上人間以銀鐵為之竹者輕建茶不取湯瓶瓶要小者易候湯又㸃茶注湯有凖黄釡為上人間以銀鐵或瓷石為之臣皇祐中脩起居注奏事仁宗皇帝屢承天問以建安貢茶并所以試茶之狀臣謂論茶雖禁中語無事於宻造茶録二篇上進後知福州為掌書記竊去藏藁不復能記知懷安縣樊紀購得之遂以刋勒行於好事者然多舛謬臣追念先帝顧遇之恩攬本流涕輒加正定書之於石以永其𫝊治平元年五月二十六日三司使給事中臣蔡襄謹記茶録
